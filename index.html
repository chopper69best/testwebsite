<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Website</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

/* HEADER */
header {
  background: #333;
  color: white;
  padding: 15px;
  text-align: center;
}

/* NAVIGATION */
nav {
  display: flex;
  justify-content: center;
  background: #555;
}

nav a {
  color: white;
  padding: 14px 20px;
  text-decoration: none;
  display: block;
}

nav a:hover {
  background: #777;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  padding: 20px;
}

/* FEATURED ROTATING AREA */
.slider {
  flex: 3;
  position: relative;
  overflow: hidden;
  height: 300px;
  background: #000;
  margin-right: 20px;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.slide a {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: white;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  text-decoration: none;
}

/* RIGHT NEWS COLUMN */
.sidebar {
  flex: 1;
}

.news-item {
  background: white;
  margin-bottom: 15px;
  padding: 10px;
  display: flex;
  gap: 10px;
}

.news-item img {
  width: 80px;
  height: 60px;
  object-fit: cover;
}

.news-item a {
  text-decoration: none;
  color: black;
  font-weight: bold;
}
</style>
</head>
<body>

<header>
  <h1>This will be a test</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="news.html">News</a>
    <a href="other.html">Other</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact Us</a>
    <a href="support.html">Support Us</a>
  </nav>

<div class="container">

  <!-- SLIDER -->
  <div class="slider">
    <div class="slide">
      <img src="https://via.placeholder.com/800x300" alt="">
      <a href="#">Article 1</a>
    </div>
    <div class="slide">
      <img src="https://via.placeholder.com/800x300/777" alt="">
      <a href="#">Article 2</a>
    </div>
    <div class="slide">
      <img src="https://via.placeholder.com/800x300/333" alt="">
      <a href="#">Article 3</a>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="news-item">
      <img src="https://via.placeholder.com/80x60">
      <a href="#">News Title 1</a>
    </div>
    <div class="news-item">
      <img src="https://via.placeholder.com/80x60">
      <a href="#">News Title 2</a>
    </div>
    <div class="news-item">
      <img src="https://via.placeholder.com/80x60">
      <a href="#">News Title 3</a>
    </div>
  </div>

</div>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide() {
  slides.forEach(slide => slide.style.display = "none");
  slides[index].style.display = "block";
  index = (index + 1) % slides.length;
}

setInterval(showSlide, 3000);
showSlide();
</script>

</body>
</html>
